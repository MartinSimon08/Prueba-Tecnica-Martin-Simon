version: '3.8'

services:

  backend:
    build: .
    container_name: minecatalog_backend
    ports:
      - "8000:8000"
    restart: always
  
    environment:
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook-test/pregunta
    networks:
      - minecatalog_net


  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    restart: always
    environment:
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_storage:/home/node/.n8n
    networks:
      - minecatalog_net
    depends_on:
      - backend

networks:
  minecatalog_net:
    driver: bridge

volumes:
  n8n_storage: